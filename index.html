<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamPulse — Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3d;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #00e5a0;
    --text: #e8e8f0;
    --muted: #6b6b8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 70vw;
    height: 70vw;
    background: radial-gradient(circle, rgba(108,99,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -10%;
    width: 50vw;
    height: 50vw;
    background: radial-gradient(circle, rgba(0,229,160,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .app { width: 100%; max-width: 480px; padding: 20px; position: relative; z-index: 1; }

  /* ---- LOGO ---- */
  .logo {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown 0.6s ease both;
  }
  .logo-mark {
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--green));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
  }
  .logo h1 span { color: var(--accent); }

  /* ---- CARD ---- */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 36px 32px;
    animation: fadeUp 0.5s ease both 0.1s;
    box-shadow: 0 24px 60px rgba(0,0,0,0.4);
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 26px;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  .card-sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
  }

  /* ---- FORM ---- */
  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    resize: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
  }
  .field textarea { height: 90px; }

  .btn {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s, box-shadow 0.2s;
    letter-spacing: 0.3px;
  }
  .btn:hover { transform: translateY(-1px); opacity: 0.92; }
  .btn:active { transform: translateY(0); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #9b94ff);
    color: #fff;
    box-shadow: 0 8px 24px rgba(108,99,255,0.35);
  }
  .btn-checkin {
    background: linear-gradient(135deg, var(--green), #00bfff);
    color: #0a0a0f;
    box-shadow: 0 8px 24px rgba(0,229,160,0.3);
    margin-bottom: 12px;
  }
  .btn-checkout {
    background: linear-gradient(135deg, var(--accent2), #ff9a6c);
    color: #fff;
    box-shadow: 0 8px 24px rgba(255,101,132,0.3);
  }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    margin-top: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
  }

  /* ---- STATUS BAR ---- */
  .user-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    margin-bottom: 24px;
  }
  .user-info { display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--green));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: #fff;
  }
  .user-name { font-weight: 500; font-size: 14px; }
  .user-email { font-size: 12px; color: var(--muted); }
  .logout-btn {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 12px; font-family: 'DM Sans', sans-serif;
    transition: color 0.2s;
  }
  .logout-btn:hover { color: var(--accent2); }

  /* ---- STATUS BADGE ---- */
  .status-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 24px;
  }
  .status-badge.idle {
    background: rgba(107,107,138,0.15);
    border: 1px solid rgba(107,107,138,0.2);
    color: var(--muted);
  }
  .status-badge.checked-in {
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--green);
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: currentColor;
    animation: pulse 2s infinite;
  }
  .status-badge.idle .dot { animation: none; }

  /* ---- TODAY LOG ---- */
  .today-log {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-top: 20px;
  }
  .log-title {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .log-item {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .log-item:last-child { border-bottom: none; padding-bottom: 0; }
  .log-type {
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .log-type.in { background: rgba(0,229,160,0.15); color: var(--green); }
  .log-type.out { background: rgba(255,101,132,0.15); color: var(--accent2); }
  .log-time { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .log-note { color: var(--muted); font-size: 12px; font-style: italic; margin-top: 4px; max-width: 200px; }

  /* ---- TOAST ---- */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 500;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    white-space: nowrap;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--accent2); color: var(--accent2); }

  /* ---- LOADER ---- */
  .loader {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  /* ---- SETUP NOTICE ---- */
  .setup-notice {
    background: rgba(108,99,255,0.1);
    border: 1px solid rgba(108,99,255,0.3);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 13px;
    color: #a5a0ff;
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .setup-notice strong { color: var(--accent); }
  .setup-notice code {
    background: rgba(108,99,255,0.2);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 12px;
  }

  /* ---- PAGES ---- */
  .page { display: none; }
  .page.active { display: block; }

  /* ---- ANIMATIONS ---- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .divider {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin: 18px 0;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 38%;
    height: 1px;
    background: var(--border);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }

  .time-display {
    font-family: 'Syne', sans-serif;
    font-size: 42px;
    font-weight: 800;
    text-align: center;
    letter-spacing: -2px;
    margin: 16px 0;
    background: linear-gradient(135deg, var(--text), var(--muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .date-display {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  @media (max-width: 480px) {
    .card { padding: 28px 22px; border-radius: 20px; }
    .time-display { font-size: 34px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="logo">
    <div class="logo-mark">
      <div class="logo-icon">⚡</div>
      <h1>Team<span>Pulse</span></h1>
    </div>
  </div>

  <!-- LOGIN PAGE -->
  <div class="page active" id="loginPage">
    <div class="card">
      <div class="card-title">Welcome back 👋</div>
      <div class="card-sub">Log in to track your attendance</div>

      <div class="field">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@company.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>

      <button class="btn btn-primary" onclick="handleLogin()">Sign In</button>

      <div class="divider">or</div>

      <button class="btn btn-outline" onclick="showPage('registerPage')">Create Account</button>
    </div>
  </div>

  <!-- REGISTER PAGE -->
  <div class="page" id="registerPage">
    <div class="card">
      <div class="card-title">Create Account</div>
      <div class="card-sub">Join your team on TeamPulse</div>

      <div class="field">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Ali Hassan">
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="you@company.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Min. 6 characters">
      </div>

      <button class="btn btn-primary" onclick="handleRegister()">Create Account</button>
      <button class="btn btn-outline" onclick="showPage('loginPage')">← Back to Login</button>
    </div>
  </div>

  <!-- ATTENDANCE PAGE -->
  <div class="page" id="attendancePage">
    <div class="card">

      <div class="user-bar">
        <div class="user-info">
          <div class="avatar" id="userAvatar">?</div>
          <div>
            <div class="user-name" id="userName">—</div>
            <div class="user-email" id="userEmail">—</div>
          </div>
        </div>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
      </div>

      <div class="time-display" id="clockDisplay">00:00:00</div>
      <div class="date-display" id="dateDisplay">—</div>

      <div class="status-badge idle" id="statusBadge">
        <div class="dot"></div>
        <span id="statusText">Not Checked In</span>
      </div>

      <!-- Notes field -->
      <div class="field" id="notesField">
        <label>Notes (Optional)</label>
        <textarea id="notesInput" placeholder="What are you working on today?"></textarea>
      </div>

      <button class="btn btn-checkin" id="checkinBtn" onclick="handleCheckin()">
        ✓ Check In
      </button>
      <button class="btn btn-checkout" id="checkoutBtn" onclick="handleCheckout()" style="display:none;">
        ✗ Check Out
      </button>

      <!-- Today's Log -->
      <div class="today-log" id="todayLog" style="display:none;">
        <div class="log-title">Today's Activity</div>
        <div id="logItems"></div>
      </div>

    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
//  CONFIG — Yahan apna Google Apps Script URL paste karein
// ============================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwK2Oblr50lhZGtVh73Q7ED3BoNmQbK64GL_JL936P2skLY1EPy1_GgfQdpxr1OvaOAnA/exec';
// ============================================================

// Simple in-browser user store (production mein backend use karein)
let users = JSON.parse(localStorage.getItem('tp_users') || '[]');
let currentUser = JSON.parse(localStorage.getItem('tp_current') || 'null');
let sessionLog = JSON.parse(localStorage.getItem('tp_session_log') || '[]');
let isCheckedIn = false;
let checkinTime = null;

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clockDisplay').textContent =
    now.toLocaleTimeString('en-US', {hour12: false});
  document.getElementById('dateDisplay').textContent =
    now.toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
}
setInterval(updateClock, 1000);
updateClock();

// Pages
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Toast
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// REGISTER
function handleRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim().toLowerCase();
  const password = document.getElementById('regPassword').value;

  if (!name || !email || !password) return showToast('Sab fields bharein', 'error');
  if (password.length < 6) return showToast('Password min 6 characters', 'error');
  if (users.find(u => u.email === email)) return showToast('Email already registered', 'error');

  users.push({ name, email, password });
  localStorage.setItem('tp_users', JSON.stringify(users));
  showToast('Account bana diya! Ab login karein ✓');
  showPage('loginPage');
}

// LOGIN
function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;

  const user = users.find(u => u.email === email && u.password === password);
  if (!user) return showToast('Email ya password galat hai', 'error');

  currentUser = user;
  localStorage.setItem('tp_current', JSON.stringify(user));
  loadAttendancePage();
}

function loadAttendancePage() {
  document.getElementById('userName').textContent = currentUser.name;
  document.getElementById('userEmail').textContent = currentUser.email;
  document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();

  // Load today's log
  const today = new Date().toLocaleDateString('en-GB');
  sessionLog = JSON.parse(localStorage.getItem('tp_session_log') || '[]');
  const todayEntries = sessionLog.filter(e => e.date === today && e.email === currentUser.email);

  if (todayEntries.length > 0) {
    const last = todayEntries[todayEntries.length - 1];
    if (last.type === 'CHECK-IN') {
      isCheckedIn = true;
      checkinTime = last.time;
      setCheckedInUI();
    }
    renderLog(todayEntries);
  }

  showPage('attendancePage');
}

function handleLogout() {
  currentUser = null;
  isCheckedIn = false;
  localStorage.removeItem('tp_current');
  showPage('loginPage');
}

// CHECK IN
async function handleCheckin() {
  if (isCheckedIn) return;
  const notes = document.getElementById('notesInput').value.trim();
  const now = new Date();
  const entry = {
    name: currentUser.name,
    email: currentUser.email,
    type: 'CHECK-IN',
    date: now.toLocaleDateString('en-GB'),
    time: now.toLocaleTimeString('en-US', {hour12: false}),
    notes: notes,
    timestamp: now.toISOString()
  };

  document.getElementById('checkinBtn').innerHTML = '<span class="loader"></span> Saving...';

  await sendToSheets(entry);

  sessionLog.push(entry);
  localStorage.setItem('tp_session_log', JSON.stringify(sessionLog));

  isCheckedIn = true;
  checkinTime = entry.time;
  setCheckedInUI();
  renderLog(sessionLog.filter(e => e.date === entry.date && e.email === currentUser.email));
  showToast(`Check-in at ${entry.time} ✓`);
}

// CHECK OUT
async function handleCheckout() {
  if (!isCheckedIn) return;
  const notes = document.getElementById('notesInput').value.trim();
  const now = new Date();
  const entry = {
    name: currentUser.name,
    email: currentUser.email,
    type: 'CHECK-OUT',
    date: now.toLocaleDateString('en-GB'),
    time: now.toLocaleTimeString('en-US', {hour12: false}),
    notes: notes,
    timestamp: now.toISOString()
  };

  document.getElementById('checkoutBtn').innerHTML = '<span class="loader"></span> Saving...';

  await sendToSheets(entry);

  sessionLog.push(entry);
  localStorage.setItem('tp_session_log', JSON.stringify(sessionLog));

  isCheckedIn = false;
  setIdleUI();
  renderLog(sessionLog.filter(e => e.date === entry.date && e.email === currentUser.email));
  document.getElementById('notesInput').value = '';
  showToast(`Check-out at ${entry.time} ✓`);
}

function setCheckedInUI() {
  document.getElementById('checkinBtn').style.display = 'none';
  document.getElementById('checkoutBtn').style.display = 'block';
  document.getElementById('checkoutBtn').innerHTML = '✗ Check Out';
  const badge = document.getElementById('statusBadge');
  badge.className = 'status-badge checked-in';
  document.getElementById('statusText').textContent = `Checked in at ${checkinTime}`;
  document.getElementById('notesInput').placeholder = 'End of day notes...';
}

function setIdleUI() {
  document.getElementById('checkinBtn').style.display = 'block';
  document.getElementById('checkinBtn').innerHTML = '✓ Check In';
  document.getElementById('checkoutBtn').style.display = 'none';
  const badge = document.getElementById('statusBadge');
  badge.className = 'status-badge idle';
  document.getElementById('statusText').textContent = 'Not Checked In';
  document.getElementById('notesInput').placeholder = 'What are you working on today?';
}

function renderLog(entries) {
  const logDiv = document.getElementById('todayLog');
  const itemsDiv = document.getElementById('logItems');
  if (entries.length === 0) { logDiv.style.display = 'none'; return; }
  logDiv.style.display = 'block';
  itemsDiv.innerHTML = entries.map(e => `
    <div class="log-item">
      <div>
        <span class="log-type ${e.type === 'CHECK-IN' ? 'in' : 'out'}">${e.type}</span>
        ${e.notes ? `<div class="log-note">"${e.notes}"</div>` : ''}
      </div>
      <div class="log-time">${e.time}</div>
    </div>
  `).join('');
}

// GOOGLE SHEETS
async function sendToSheets(entry) {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
    console.warn('Google Sheets URL not set — data only saved locally');
    return;
  }
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry)
    });
  } catch (e) {
    console.error('Sheets error:', e);
  }
}

// Auto login if session exists
if (currentUser) loadAttendancePage();
</script>
</body>
</html>
